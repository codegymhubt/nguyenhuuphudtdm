<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đặt Bàn Nhà Hàng Trực Tuyến Thời Gian Thực</title>
    <style>
        /* === PHẦN CSS: Giao diện hiện đại, chia làm 2 cột === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        /* Bố cục chính chia làm 2 phần khi màn hình rộng */
        .main-layout {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap; /* Tự động xuống dòng trên điện thoại */
        }
        /* Cột bên trái: Form đặt bàn */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            flex: 1;
            min-width: 350px;
        }
        /* Cột bên phải: Danh sách hiển thị trực quan */
        .list-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            flex: 1;
            min-width: 350px;
            max-height: 600px;
            overflow-y: auto; /* Cuộn trang nếu danh sách quá dài */
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: #3498db;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 6px;
        }
        .success { background-color: #e8f8f5; color: #27ae60; }
        .error { background-color: #fce4d6; color: #c0392b; }

        /* CSS CSS thiết kế cho các thẻ hiển thị danh sách đặt bàn */
        .booking-card {
            background-color: #f8f9fa;
            border-left: 5px solid #2ecc71;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            animation: fadeIn 0.5s ease-in-out;
        }
        .booking-card p {
            margin-bottom: 5px;
            color: #555;
            font-size: 15px;
        }
        .booking-card .client-name {
            font-weight: bold;
            color: #2c3e50;
            font-size: 16px;
        }
        .booking-card .table-badge {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .booking-card .time-stamp {
            font-size: 12px;
            color: #95a5a6;
            text-align: right;
            margin-top: 5px;
        }
        .no-data {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
            margin-top: 30px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <!-- CỘT TRÁI: FORM ĐĂNG KÝ ĐẶT BÀN -->
        <div class="form-container">
            <h2>ĐẶT BÀN NHÀ HÀNG</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="fullname">Họ và tên khách hàng:</label>
                    <input type="text" id="fullname" placeholder="Nhập họ và tên..." required>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại:</label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." required>
                </div>

                <div class="form-group">
                    <label for="tableNumber">Chọn bàn muốn đặt:</label>
                    <select id="tableNumber" required>
                        <option value="" disabled selected>-- Chọn số bàn --</option>
                        <option value="Bàn số 01 (Khu cửa sổ)">Bàn số 01 (Khu cửa sổ)</option>
                        <option value="Bàn số 02 (Khu trung tâm)">Bàn số 02 (Khu trung tâm)</option>
                        <option value="Bàn số 03 (Khu sân vườn)">Bàn số 03 (Khu sân vườn)</option>
                        <option value="Bàn số 04 (Phòng VIP 1)">Bàn số 04 (Phòng VIP 1)</option>
                        <option value="Bàn số 05 (Phòng VIP 2)">Bàn số 05 (Phòng VIP 2)</option>
                    </select>
                </div>

                <button type="submit" id="btnSubmit">Xác Nhận Đặt Bàn</button>
            </form>
            <div id="statusMessage" class="message"></div>
        </div>

        <!-- CỘT PHẢI: HIỂN THỊ DANH SÁCH KHÁCH ĐÃ ĐẶT (REALTIME) -->
        <div class="list-container">
            <h2>DANH SÁCH ĐẶT BÀN THỜI GIAN THỰC</h2>
            <div id="bookingList">
                <div class="no-data">Đang tải dữ liệu từ Cloud...</div>
            </div>
        </div>
    </div>

    <!-- === PHẦN JAVASCRIPT & KẾT NỐI FIREBASE REALTIME === -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://gstatic.com";

        // LƯU Ý: Thay thế đoạn thông số bên dưới bằng cấu hình chính xác từ Firebase Console của em
        const firebaseConfig = {
            apiKey: "AIzaSyA123456789...",
            authDomain: "://firebaseapp.com",
            projectId: "web-dat-ban",
            storageBucket: "://appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:123456789"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. CHỨC NĂNG LẮNG NGHE VÀ HIỂN THỊ DỮ LIỆU LÊN MÀN HÌNH THEO THỜI GIAN THỰC
        const bookingListDiv = document.getElementById('bookingList');
        
        // Tạo câu lệnh truy vấn: Lấy dữ liệu từ bộ sưu tập 'reservations' sắp xếp theo thời gian mới nhất lên đầu
        const q = query(collection(db, "reservations"), orderBy("thoi_gian_dat", "desc"));

        // Sử dụng hàm onSnapshot để liên tục lắng nghe thay đổi từ cơ sở dữ liệu Cloud
        onSnapshot(q, (querySnapshot) => {
            bookingListDiv.innerHTML = ""; // Xóa danh sách cũ đi để vẽ lại

            if (querySnapshot.empty) {
                bookingListDiv.innerHTML = '<div class="no-data">Chưa có khách hàng nào đặt bàn.</div>';
                return;
            }

            // Duyệt qua từng bản ghi dữ liệu đổ về từ Firebase
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Chuyển đổi định dạng thời gian Firebase Timestamp sang chuỗi giờ Việt Nam để đọc
                let timeString = "Đang xử lý...";
                if(data.thoi_gian_dat) {
                    const date = data.thoi_gian_dat.toDate();
                    timeString = date.toLocaleTimeString('vi-VN') + " - " + date.toLocaleDateString('vi-VN');
                }

                // Tạo cấu trúc mã HTML động cho thẻ hiển thị (Card)
                const card = document.createElement('div');
                card.className = 'booking-card';
                card.innerHTML = `
                    <p class="client-name">👤 Khách hàng: ${data.khach_hang}</p>
                    <p>📞 Số điện thoại: ${data.so_dien_thoai}</p>
                    <p>📍 Trạng thái: <span class="table-badge">Đã đặt ${data.so_ban}</span></p>
                    <div class="time-stamp">⏱ Đặt lúc: ${timeString}</div>
                `;
                bookingListDiv.appendChild(card); // Đẩy thẻ card ra ngoài màn hình CSS
            });
        });

        // 2. CHỨC NĂNG LƯU DỮ LIỆU KHI KHÁCH BẤM ĐẶT BÀN
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const tableNumber = document.getElementById('tableNumber').value;
            const statusMessage = document.getElementById('statusMessage');
            const btnSubmit = document.getElementById('btnSubmit');

            btnSubmit.innerText = "Đang xử lý...";
            btnSubmit.disabled = true;

            try {await addDoc(collection(db, "reservations"), {khach_hang: fullname,so_dien_thoai: phone,so_ban: tableNumber,thoi_gian_dat: serverTimestamp()});statusMessage.className = "message success";statusMessage.innerText = "🎉 Đặt bàn thành công! Hệ thống đã ghi nhận.";statusMessage.style.display = "block";document.getElementById('bookingForm').reset();setTimeout(() => { statusMessage.style.display = "none"; }, 4000);} catch (error) {console.error("Lỗi: ", error);statusMessage.className = "message error";statusMessage.innerText = "❌ Lỗi kết nối đồng bộ đám mây.";statusMessage.style.display = "block";} finally {btnSubmit.innerText = "Xác Nhận Đặt Bàn Ngay";btnSubmit.disabled = false;}});
            
    </script>
</body>
</html>
