<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt Bàn Nhà Hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --gold: #C9A84C;
    --gold-light: #F0D98A;
    --gold-dark: #8B6914;
    --ink: #1A1612;
    --ink-soft: #3D3730;
    --ink-muted: #8C8178;
    --border: rgba(201,168,76,0.25);
    --border-soft: rgba(26,22,18,0.08);
    --success: #2D7A4F;
    --success-bg: #EDF7F2;
    --error: #A63220;
    --error-bg: #FDF0EE;
    --card-bg: #FFFDF9;
    --shadow: 0 2px 20px rgba(26,22,18,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
    min-height: 100vh;
    color: var(--ink);
    padding: 40px 20px 60px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .page-header .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .page-header h1 span { color: var(--gold); }
  .page-header p {
    font-size: 14px;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.01em;
  }
  .divider {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin: 18px auto 0; width: 200px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider-gem {
    width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); border-radius: 1px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .panel-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 7px;
  }

  input, select {
    width: 100%;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--ink-muted); opacity: 0.6; }
  input:focus, select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    background: var(--warm-white);
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '';
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    border: 5px solid transparent;
    border-top: 6px solid var(--ink-muted);
    pointer-events: none;
  }

  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--gold);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: var(--gold-light); }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit svg { width: 16px; height: 16px; }

  .toast {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 400;
    display: none;
    animation: slideDown 0.25s ease;
  }
  .toast.ok { background: var(--success-bg); color: var(--success); border: 1px solid rgba(45,122,79,0.15); }
  .toast.err { background: var(--error-bg); color: var(--error); border: 1px solid rgba(166,50,32,0.15); }

  .list-scroll { max-height: 460px; overflow-y: auto; padding-right: 4px; }
  .list-scroll::-webkit-scrollbar { width: 4px; }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .booking-card {
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: var(--cream);
    animation: fadeUp 0.35s ease both;
    position: relative;
    overflow: hidden;
  }
  .booking-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--gold);
    border-radius: 3px 0 0 3px;
  }
  .booking-card .c-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    padding-left: 4px;
  }
  .booking-card .c-row {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 3px;
    display: flex; align-items: center; gap: 7px;
    padding-left: 4px;
  }
  .booking-card .c-row svg { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.7; }
  .badge {
    display: inline-block;
    background: rgba(201,168,76,0.12);
    color: var(--gold-dark);
    border: 1px solid rgba(201,168,76,0.3);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .c-time {
    font-size: 11px;
    color: var(--ink-muted);
    opacity: 0.6;
    text-align: right;
    margin-top: 8px;
    padding-left: 4px;
  }

  .counter {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(201,168,76,0.12);
    color: var(--gold-dark);
    border: 1px solid rgba(201,168,76,0.25);
    font-size: 11px; font-weight: 500;
    width: 22px; height: 22px; border-radius: 50%;
    margin-left: auto;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
    font-size: 14px;
    font-style: italic;
    opacity: 0.7;
  }
  .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }
  @keyframes slideDown {
    from { opacity:0; transform: translateY(-6px); }
    to { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Nhà hàng cao cấp</div>
  <h1>Đặt <span>Bàn</span> Trực Tuyến</h1>
  <p>Điền thông tin bên dưới — chúng tôi sẽ giữ chỗ cho bạn</p>
  <div class="divider"><div class="divider-gem"></div></div>
</div>

<div class="layout">

  <!-- Form bên trái -->
  <div class="panel">
    <div class="panel-label">Thông tin đặt bàn</div>

    <div class="form-group">
      <label>Họ và tên khách hàng</label>
      <input type="text" id="fn" placeholder="Nguyễn Văn A" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Số điện thoại</label>
      <input type="tel" id="ph" placeholder="0901 234 567" autocomplete="tel">
    </div>
    <div class="form-group">
      <label>Chọn bàn</label>
      <div class="select-wrap">
        <select id="tb">
          <option value="" disabled selected>— Chọn số bàn —</option>
          <option value="Bàn 01 · Khu cửa sổ">Bàn 01 · Khu cửa sổ</option>
          <option value="Bàn 02 · Khu trung tâm">Bàn 02 · Khu trung tâm</option>
          <option value="Bàn 03 · Khu sân vườn">Bàn 03 · Khu sân vườn</option>
          <option value="Bàn 04 · Phòng VIP 1">Bàn 04 · Phòng VIP 1</option>
          <option value="Bàn 05 · Phòng VIP 2">Bàn 05 · Phòng VIP 2</option>
        </select>
      </div>
    </div>

    <button class="btn-submit" id="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Xác nhận đặt bàn
    </button>
    <div class="toast" id="toast"></div>
  </div>

  <!-- Danh sách bên phải -->
  <div class="panel">
    <div class="panel-label" style="display:flex;align-items:center;">
      Danh sách đặt bàn
      <span class="counter" id="cnt">0</span>
    </div>
    <div class="list-scroll">
      <div id="list">
        <div class="empty">
          <div class="empty-icon">🍽</div>
          Chưa có đơn đặt bàn nào.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const bookings = [];

  const ICONS = {
    phone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.86 9.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012.77 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 8.91a16 16 0 006 6l.91-.91a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`,
    table: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`
  };

  function render() {
    const el = document.getElementById('list');
    document.getElementById('cnt').textContent = bookings.length;
    if (!bookings.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🍽</div>Chưa có đơn đặt bàn nào.</div>';
      return;
    }
    el.innerHTML = bookings.map((b, i) => `
      <div class="booking-card" style="animation-delay:${i * 0.04}s">
        <div class="c-name">${b.name}</div>
        <div class="c-row">${ICONS.phone} ${b.phone}</div>
        <div class="c-row">${ICONS.table} <span class="badge">${b.table}</span></div>
        <div class="c-time">Đặt lúc ${b.time}</div>
      </div>
    `).join('');
  }

  document.getElementById('btn').addEventListener('click', () => {
    const name = document.getElementById('fn').value.trim();
    const phone = document.getElementById('ph').value.trim();
    const table = document.getElementById('tb').value;
    const toast = document.getElementById('toast');

    if (!name || !phone || !table) {
      toast.className = 'toast err';
      toast.textContent = '⚠ Vui lòng điền đầy đủ tất cả thông tin.';
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3500);
      return;
    }

    const now = new Date();
    const time = now.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}) +
                 ' · ' + now.toLocaleDateString('vi-VN');

    bookings.unshift({ name, phone, table, time });
    render();

    document.getElementById('fn').value = '';
    document.getElementById('ph').value = '';
    document.getElementById('tb').selectedIndex = 0;
    document.getElementById('fn').focus();

    toast.className = 'toast ok';
    toast.textContent = '✓ Đặt bàn thành công! Cảm ơn quý khách.';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3500);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn').click();
  });

  render();
</script>
</body>
</html>
